<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact | Box Boys</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="container">

        <h1 class="logo">BOX BOYS</h1>

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>

    </div>
</header>

<section class="contact-page">

    <div class="container">

        <h2>Contact Us</h2>

        <p>
            Need cardboard picked up? Fill out the form below and we'll
            get back to you as soon as possible.
        </p>

        <form
            id="pickup-form"
            action="https://formspree.io/f/mrenypdg"
            method="POST">

            <input
                type="text"
                name="name"
                placeholder="Full Name"
                required>

            <input
                type="email"
                name="email"
                placeholder="Email Address"
                required>

            <input
                type="tel"
                name="phone"
                placeholder="Phone Number">

            <textarea
                name="message"
                rows="7"
                placeholder="Tell us about your cardboard pickup..."
                required></textarea>

            <button class="button" type="submit">
                Request Pickup
            </button>

            <p id="form-status"></p>

        </form>

    </div>

</section>

<footer>
    <div class="container">
        <p>© 2026 Box Boys. All Rights Reserved.</p>
    </div>
</footer>

<script>
    const form = document.getElementById("pickup-form");
    const formStatus = document.getElementById("form-status");
    const submitButton = form.querySelector("button");

    form.addEventListener("submit", async function(event) {
        event.preventDefault();

        formStatus.textContent = "Sending...";
        submitButton.disabled = true;

        try {
            const response = await fetch(form.action, {
                method: "POST",
                body: new FormData(form),
                headers: {
                    "Accept": "application/json"
                }
            });

            if (response.ok) {
                formStatus.textContent =
                    "Thank you! Your pickup request was sent successfully.";
                form.reset();
            } else {
                formStatus.textContent =
                    "Your request could not be sent. Please try again.";
            }
        } catch (error) {
            formStatus.textContent =
                "Your request could not be sent. Please try again.";
        } finally {
            submitButton.disabled = false;
        }
    });
</script>

</body>
</html>
