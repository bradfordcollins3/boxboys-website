<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact | Box Boys</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>

    <div class="container">

        <h1 class="logo">BOX BOYS</h1>

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>

    </div>

</header>


<section class="contact-page">

    <div class="container">

        <h2>Contact Us</h2>

        <p>
            Need cardboard picked up? Fill out the form below and we'll
            get back to you as soon as possible.
        </p>

        <form id="pickup-form" action="https://formspree.io/f/mrenypdg" method="POST">

            <input
                type="text"
                name="name"
                placeholder="Full Name"
                required>
        
            <input
                type="email"
                name="email"
                placeholder="Email Address"
                required>
        
            <input
                type="tel"
                name="phone"
                placeholder="Phone Number">
        
            <textarea
                name="message"
                rows="7"
                placeholder="Tell us about your cardboard pickup..."
                required></textarea>
        
            <button class="button" type="submit">
                Request Pickup
            </button>
        
            <p id="form-status"></p>
        
        </form>

        <script>
            const form = document.getElementById("pickup-form");
            const statusMessage = document.getElementById("form-status");
        
            form.addEventListener("submit", async function (event) {
                event.preventDefault();
        
                statusMessage.textContent = "Sending...";
        
                const formData = new FormData(form);
        
                try {
                    const response = await fetch(form.action, {
                        method: form.method,
                        body: formData,
                        headers: {
                            Accept: "application/json"
                        }
                    });
        
                    if (response.ok) {
                        statusMessage.textContent =
                            "Thank you! Your pickup request was sent successfully.";
                        form.reset();
                    } else {
                        statusMessage.textContent =
                            "Something went wrong. Please try again.";
                    }
                } catch (error) {
                    statusMessage.textContent =
                        "Something went wrong. Please try again.";
                }
            });
        </script>

    </div>

</section>


<footer>

    <div class="container">

        <p>© 2026 Box Boys. All Rights Reserved.</p>

    </div>

</footer>

</body>
</html>
